<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Add black borders to all table cells */
    .table th, 
    .table td {
      border: 1px solid #000 !important;
    }

    /* Dark header styling */
    .table thead {
      background-color: #343a40;
      color: #fff;
    }

    /* Table title styling */
    .table-title {
      text-align: center;
      font-size: 1.5rem;
      font-weight: bold;
      margin-bottom: 15px;
      color: #0d6efd;
    }
  </style>
  <link rel="stylesheet" href="/static/index.css">
  <title>Student Dashboard</title>
</head>
<body>
   <nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
      <!-- Brand -->
      <a class="navbar-brand" href="#"><h2 class="mb-0">Drive 1</h2></a>

      <!-- Toggler -->
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" 
              data-bs-target="#navbarNav" aria-controls="navbarNav" 
              aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <!-- Links -->
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto"> <!-- ms-auto pushes links to the right -->
          <li class="nav-item">
            <a class="nav-link active" href="/update-drive-details">History</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" href="/s-dash"> | Back</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>


<div class="container my-5">
    <!-- Table Name Section -->
    <div class="table-title">Details</div>

    <!-- Dynamic Drive Description -->
    <p>
        Through this application, students can apply to ongoing drives at 
        <strong>{{ company.name }}</strong>.
    </p>
</div>

<div class="container my-5">
    <!-- Table Name Section -->
    <div class="table-title">Actions</div>

    <p>
        <a href="{{ url_for('s_application', company_id=company.c_id) }}">
            <button type="button" class="btn btn-primary">Apply</button>
        </a>
        <a href="{{ url_for('c_dash', company_id=company.c_id) }}">
            <button type="button" class="btn btn-primary">Go Back</button>
        </a>
        <a href="{{ url_for('drive_details', company_id=company.c_id) }}">
            <button type="button" class="btn btn-primary">View Details</button>
        </a>
    </p>
</div>
</body>
</html>
